<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Training Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1a1d2e 0%, #2d1b4e 100%);
  padding: 16px 24px;
  border-bottom: 1px solid #2a2d3e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.controls label {
  font-size: 13px;
  color: #9ca3af;
}
.controls select, .controls button {
  background: #1e2030;
  color: #e0e0e0;
  border: 1px solid #3a3d4e;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.controls select:hover, .controls button:hover {
  border-color: #60a5fa;
  background: #252838;
}
.controls button.active {
  background: #3b5bdb;
  border-color: #60a5fa;
  color: white;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
  gap: 16px;
  padding: 16px 24px;
  max-width: 1600px;
  margin: 0 auto;
}
.card {
  background: #1a1d2e;
  border-radius: 10px;
  border: 1px solid #2a2d3e;
  overflow: hidden;
  transition: border-color 0.3s;
}
.card:hover {
  border-color: #4a4d5e;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid #2a2d3e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: #c0c4d8;
}
.card-header .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #2a2d3e;
  color: #9ca3af;
}
.chart-container {
  width: 100%;
  height: 300px;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 12px;
  padding: 0 24px 16px;
  max-width: 1600px;
  margin: 0 auto;
}
.stat-card {
  background: #1a1d2e;
  border-radius: 8px;
  border: 1px solid #2a2d3e;
  padding: 14px 16px;
}
.stat-card .label {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 4px;
}
.stat-card .value {
  font-size: 22px;
  font-weight: 700;
}
.stat-card .value.positive { color: #34d399; }
.stat-card .value.negative { color: #f87171; }
.stat-card .value.info { color: #60a5fa; }
.stat-card .value.warn { color: #fbbf24; }
.table-container {
  padding: 0 24px 16px;
  max-width: 1600px;
  margin: 0 auto;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  background: #1e2030;
  color: #9ca3af;
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid #2a2d3e;
  position: sticky;
  top: 0;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid #1e2030;
  color: #c0c4d8;
}
tr:hover td {
  background: #252838;
}
.tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.tag-ppo { background: #1e3a5f; color: #60a5fa; }
.tag-sac { background: #1a3a2a; color: #34d399; }
.tag-td3 { background: #3a2a1a; color: #fbbf24; }
.tag-ddpg { background: #3a1a3a; color: #c084fc; }
.tag-a2c { background: #2a1a1a; color: #f87171; }
.file-input-wrapper {
  position: relative;
}
.file-input-wrapper input[type="file"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.tab-bar {
  display: flex;
  gap: 0;
  padding: 0 24px;
  background: #15171f;
  border-bottom: 1px solid #2a2d3e;
  max-width: 1600px;
  margin: 0 auto;
}
.tab-bar button {
  background: none;
  border: none;
  color: #6b7280;
  padding: 10px 20px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-bar button.active {
  color: #60a5fa;
  border-bottom-color: #60a5fa;
}
.tab-bar button:hover {
  color: #c0c4d8;
}
.tab-content { display: none; }
.tab-content.active { display: block; }
.full-width { grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 RL Training Tracker</h1>
  <div class="controls">
    <label>Environment:</label>
    <select id="envSelect"><option value="all">All Environments</option></select>
    <label>Algorithm:</label>
    <select id="algoSelect"><option value="all">All Algorithms</option></select>
    <label>Metric:</label>
    <select id="metricSelect">
      <option value="ep_reward_mean">Episode Reward (Smooth)</option>
      <option value="ep_reward">Episode Reward</option>
      <option value="loss">Loss</option>
      <option value="value_loss">Value Loss</option>
      <option value="policy_loss">Policy Loss</option>
      <option value="entropy">Entropy</option>
      <option value="success_rate">Success Rate</option>
      <option value="learning_rate">Learning Rate</option>
      <option value="fps">FPS</option>
    </select>
    <div class="file-input-wrapper">
      <button>📂 Load JSON</button>
      <input type="file" id="fileInput" accept=".json" multiple>
    </div>
    <button id="resetBtn">↺ Reset</button>
  </div>
</div>

<div class="tab-bar">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="comparison">Algorithm Comparison</button>
  <button data-tab="summary">Summary Table</button>
</div>

<!-- Overview Tab -->
<div class="tab-content active" id="tab-overview">
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="grid">
    <div class="card">
      <div class="card-header">
        <h3 id="mainChartTitle">Episode Reward (Smooth)</h3>
        <span class="badge" id="mainChartBadge"></span>
      </div>
      <div class="chart-container" id="mainChart"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>Loss Curve</h3>
      </div>
      <div class="chart-container" id="lossChart"></div>
    </div>
  </div>
</div>

<!-- Comparison Tab -->
<div class="tab-content" id="tab-comparison">
  <div class="grid">
    <div class="card full-width">
      <div class="card-header">
        <h3>Algorithm Comparison by Environment</h3>
      </div>
      <div class="chart-container" id="comparisonChart" style="height: 450px;"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Loss Comparison</h3></div>
      <div class="chart-container" id="lossComparisonChart"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>FPS Comparison</h3></div>
      <div class="chart-container" id="fpsComparisonChart"></div>
    </div>
  </div>
</div>

<!-- Summary Tab -->
<div class="tab-content" id="tab-summary">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Algorithm</th><th>Env</th><th>Seed</th>
          <th>Final Reward</th><th>Mean (last 100)</th><th>Std</th>
          <th>Final Loss</th><th>Final FPS</th><th>Avg FPS</th>
        </tr>
      </thead>
      <tbody id="summaryTable"></tbody>
    </table>
  </div>
</div>

<script>
// ===== Data Management =====
let allData = [];
let filteredData = [];

const COLORS = ['#60a5fa', '#f87171', '#34d399', '#fbbf24', '#c084fc', '#fb923c', '#2dd4bf', '#f472b6', '#a3e635'];
const ALGO_COLORS = { 'PPO': '#60a5fa', 'SAC': '#34d399', 'TD3': '#fbbf24', 'DDPG': '#c084fc', 'A2C': '#f87171' };
const ALGO_CLASS = { 'PPO': 'tag-ppo', 'SAC': 'tag-sac', 'TD3': 'tag-td3', 'DDPG': 'tag-ddpg', 'A2C': 'tag-a2c' };

function loadMockData() {
  const dirs = ['PPO', 'SAC', 'TD3', 'DDPG', 'A2C'];
  const promises = dirs.map(dir =>
    fetch(`data/${dir}_Humanoid_42.json`)
      .then(r => r.json())
      .catch(() => null)
  );
  // Try loading sample data
  Promise.all([
    fetch('data/PPO_Humanoid_42.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_Humanoid_123.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_Humanoid_456.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_Humanoid_42.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_Humanoid_123.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_Humanoid_456.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_CartPole_42.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_CartPole_123.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_CartPole_456.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_CartPole_42.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_CartPole_123.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_CartPole_456.json').then(r => r.json()).catch(() => null),
    fetch('data/TD3_CartPole_42.json').then(r => r.json()).catch(() => null),
    fetch('data/TD3_CartPole_123.json').then(r => r.json()).catch(() => null),
    fetch('data/TD3_CartPole_456.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_Pendulum_42.json').then(r => r.json()).catch(() => null),
    fetch('data/PPO_Pendulum_123.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_Pendulum_42.json').then(r => r.json()).catch(() => null),
    fetch('data/SAC_Pendulum_123.json').then(r => r.json()).catch(() => null),
    fetch('data/DDPG_CartPole_42.json').then(r => r.json()).catch(() => null),
    fetch('data/DDPG_CartPole_123.json').then(r => r.json()).catch(() => null),
    fetch('data/A2C_CartPole_42.json').then(r => r.json()).catch(() => null),
  ]).then(results => {
    results.forEach((d, i) => {
      if (d) {
        allData.push(d);
        d._id = i;
      }
    });
    initApp();
  });
}

function loadFiles(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        data._id = allData.length;
        allData.push(data);
        initApp();
      } catch(err) { console.error('Failed to parse:', f.name, err); }
    };
    reader.readAsText(f);
  });
}

function getFilteredData() {
  const env = document.getElementById('envSelect').value;
  const algo = document.getElementById('algoSelect').value;
  return allData.filter(d => {
    if (env !== 'all' && d.env !== env) return false;
    if (algo !== 'all' && d.algorithm !== algo) return false;
    return true;
  });
}

// ===== ECharts Setup =====
const mainChart = echarts.init(document.getElementById('mainChart'));
const lossChart = echarts.init(document.getElementById('lossChart'));
const comparisonChart = echarts.init(document.getElementById('comparisonChart'));
const lossComparisonChart = echarts.init(document.getElementById('lossComparisonChart'));
const fpsComparisonChart = echarts.init(document.getElementById('fpsComparisonChart'));

const defaultOption = {
  backgroundColor: 'transparent',
  textStyle: { color: '#9ca3af', fontSize: 11 },
  tooltip: { trigger: 'axis', backgroundColor: '#1e2030', borderColor: '#3a3d4e', textStyle: { color: '#e0e0e0' } },
  legend: {
    textStyle: { color: '#9ca3af' },
    top: 0, right: 0,
    type: 'scroll',
    itemWidth: 12, itemHeight: 8,
  },
  grid: { left: 50, right: 16, top: 36, bottom: 24 },
  dataZoom: [
    { type: 'inside', xAxisIndex: [0], start: 0, end: 100 },
    { type: 'slider', xAxisIndex: [0], start: 0, end: 100, bottom: 4,
      backgroundColor: '#1a1d2e', fillerColor: 'rgba(96,165,250,0.15)',
      borderColor: '#2a2d3e', textStyle: { color: '#6b7280', fontSize: 10 } }
  ]
};

// ===== Rendering =====
function renderMainChart() {
  const metric = document.getElementById('metricSelect').value;
  const data = getFilteredData();
  const series = [];
  
  data.forEach((d, i) => {
    const label = `${d.algorithm} / ${d.env} (seed=${d.seed})`;
    series.push({
      name: label,
      type: 'line',
      data: metric === 'ep_reward' ? d.ep_reward : d[metric] || [],
      smooth: 0.4,
      symbol: 'none',
      lineStyle: { width: metric === 'ep_reward' ? 1 : 1.5 },
      areaStyle: metric === 'ep_reward' ? { opacity: 0.15 } : null,
      color: ALGO_COLORS[d.algorithm] || COLORS[i % COLORS.length],
      emphasis: { focus: 'series' }
    });
  });

  const metricLabels = {
    ep_reward_mean: 'Episode Reward (Smooth)',
    ep_reward: 'Episode Reward',
    loss: 'Loss',
    value_loss: 'Value Loss',
    policy_loss: 'Policy Loss',
    entropy: 'Entropy',
    success_rate: 'Success Rate',
    learning_rate: 'Learning Rate',
    fps: 'FPS'
  };

  document.getElementById('mainChartTitle').textContent = metricLabels[metric] || metric;
  document.getElementById('mainChartBadge').textContent = `${data.length} experiments`;

  mainChart.setOption({
    ...defaultOption,
    xAxis: { type: 'category', name: 'Episode', nameLocation: 'center', nameGap: 22, nameTextStyle: { color: '#6b7280' } },
    yAxis: { type: 'value', name: metricLabels[metric] || metric, nameTextStyle: { color: '#6b7280' },
      splitLine: { lineStyle: { color: '#2a2d3e' } } },
    series
  }, true);
}

function renderLossChart() {
  const data = getFilteredData();
  const series = [];
  data.forEach((d, i) => {
    series.push({
      name: `${d.algorithm} / ${d.env} (seed=${d.seed})`,
      type: 'line',
      data: d.loss,
      smooth: 0.4,
      symbol: 'none',
      lineStyle: { width: 1.5 },
      color: ALGO_COLORS[d.algorithm] || COLORS[i % COLORS.length],
    });
  });

  lossChart.setOption({
    ...defaultOption,
    xAxis: { type: 'category', name: 'Episode', nameLocation: 'center', nameGap: 22, nameTextStyle: { color: '#6b7280' } },
    yAxis: { type: 'value', name: 'Loss', nameTextStyle: { color: '#6b7280' },
      splitLine: { lineStyle: { color: '#2a2d3e' } } },
    series
  });
}

function renderComparison() {
  const envs = [...new Set(allData.map(d => d.env))];
  const algos = [...new Set(allData.map(d => d.algorithm))];
  const series = [];

  algos.forEach(algo => {
    envs.forEach(env => {
      const subset = allData.filter(d => d.algorithm === algo && d.env === env);
      if (subset.length === 0) return;
      
      // Aggregate: mean ± std across seeds
      const maxLen = Math.max(...subset.map(d => d.ep_reward.length));
      const means = [], stds = [];
      for (let i = 0; i < maxLen; i++) {
        const vals = subset.map(d => d.ep_reward[i] || 0);
        const m = vals.reduce((a,b) => a+b, 0) / vals.length;
        const s = Math.sqrt(vals.reduce((a,v) => a + (v-m)**2, 0) / vals.length);
        means.push(+m.toFixed(2));
        stds.push(+s.toFixed(2));
      }
      
      series.push({
        name: `${algo} / ${env}`,
        type: 'line',
        data: means,
        smooth: 0.4,
        symbol: 'none',
        lineStyle: { width: 2 },
        color: ALGO_COLORS[algo],
        markArea: {
          data: [{
            yAxis: 'stack',
            itemStyle: { color: 'rgba(0,0,0,0.15)' },
            label: { show: false }
          }]
        }
      });
      
      // Add std band
      const stdSeries = series.find(s => s.name === `${algo} / ${env}`);
    });
  });

  // Rebuild with std bands
  const newSeries = [];
  algos.forEach(algo => {
    envs.forEach(env => {
      const subset = allData.filter(d => d.algorithm === algo && d.env === env);
      if (subset.length === 0) return;
      const maxLen = Math.max(...subset.map(d => d.ep_reward.length));
      const means = [], stds = [];
      for (let i = 0; i < maxLen; i++) {
        const vals = subset.map(d => d.ep_reward[i] || 0);
        const m = vals.reduce((a,b) => a+b, 0) / vals.length;
        const s = Math.sqrt(vals.reduce((a,v) => a + (v-m)**2, 0) / vals.length);
        means.push(+m.toFixed(2));
        stds.push(+s.toFixed(2));
      }
      newSeries.push({
        name: `${algo} / ${env}`,
        type: 'line',
        data: means,
        smooth: 0.4,
        symbol: 'none',
        lineStyle: { width: 2 },
        color: ALGO_COLORS[algo],
        areaStyle: { opacity: 0.1 }
      });
    });
  });

  comparisonChart.setOption({
    ...defaultOption,
    legend: { ...defaultOption.legend, show: true, top: 0 },
    xAxis: { type: 'category', name: 'Episode', nameLocation: 'center', nameGap: 22, nameTextStyle: { color: '#6b7280' } },
    yAxis: { type: 'value', name: 'Episode Reward (Mean across seeds)', nameTextStyle: { color: '#6b7280' },
      splitLine: { lineStyle: { color: '#2a2d3e' } } },
    series: newSeries,
    graphic: [{
      type: 'text',
      left: 'center',
      bottom: 8,
      style: { text: '', fill: '#6b7280', fontSize: 10 }
    }]
  });

  // Loss comparison
  const lossSeries = [];
  algos.forEach(algo => {
    envs.forEach(env => {
      const subset = allData.filter(d => d.algorithm === algo && d.env === env);
      if (subset.length === 0) return;
      const maxLen = Math.max(...subset.map(d => d.loss.length));
      const means = [];
      for (let i = 0; i < maxLen; i++) {
        const vals = subset.map(d => d.loss[i] || 0);
        means.push(+(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(4));
      }
      lossSeries.push({
        name: `${algo} / ${env}`,
        type: 'line',
        data: means,
        smooth: 0.4,
        symbol: 'none',
        lineStyle: { width: 1.5 },
        color: ALGO_COLORS[algo],
      });
    });
  });

  lossComparisonChart.setOption({
    ...defaultOption,
    xAxis: { type: 'category', name: 'Episode', nameLocation: 'center', nameGap: 22, nameTextStyle: { color: '#6b7280' } },
    yAxis: { type: 'value', name: 'Loss', nameTextStyle: { color: '#6b7280' },
      splitLine: { lineStyle: { color: '#2a2d3e' } } },
    series: lossSeries
  });

  // FPS comparison
  const fpsSeries = [];
  algos.forEach(algo => {
    envs.forEach(env => {
      const subset = allData.filter(d => d.algorithm === algo && d.env === env);
      if (subset.length === 0) return;
      const means = subset.map(d => +(d.fps.reduce((a,b) => a+b, 0) / d.fps.length).toFixed(1));
      const stds = subset.map(d => {
        const m = d.fps.reduce((a,b) => a+b, 0) / d.fps.length;
        return +(Math.sqrt(d.fps.reduce((a,v) => a + (v-m)**2, 0) / d.fps.length).toFixed(1));
      });
      fpsSeries.push({
        name: `${algo}`,
        type: 'bar',
        data: means,
        color: ALGO_COLORS[algo],
        itemStyle: { borderRadius: [4, 4, 0, 0] },
        barGap: '10%',
        barCategoryGap: '20%'
      });
    });
  });

  fpsComparisonChart.setOption({
    ...defaultOption,
    legend: { show: false },
    xAxis: { type: 'category', data: envs, name: 'Environment', nameTextStyle: { color: '#6b7280' } },
    yAxis: { type: 'value', name: 'Avg FPS', nameTextStyle: { color: '#6b7280' },
      splitLine: { lineStyle: { color: '#2a2d3e' } } },
    series: fpsSeries
  });
}

function renderSummaryStats() {
  const data = getFilteredData();
  const metric = document.getElementById('metricSelect').value;
  const grid = document.getElementById('summaryGrid');
  
  if (data.length === 0) {
    grid.innerHTML = '<p style="padding:20px;color:#6b7280;">No data to display</p>';
    return;
  }

  const metricLabels = {
    ep_reward_mean: 'Final Avg Reward', ep_reward: 'Final Reward',
    loss: 'Final Loss', value_loss: 'Final Value Loss',
    policy_loss: 'Final Policy Loss', entropy: 'Final Entropy',
    success_rate: 'Final Success Rate', learning_rate: 'Final LR', fps: 'Avg FPS'
  };

  const stats = [
    {
      label: 'Experiments',
      value: data.length,
      cls: 'info'
    },
    {
      label: metricLabels[metric] || metric,
      value: metric === 'fps'
        ? Math.round(data.reduce((a,d) => a + (d.fps.reduce((x,y) => x+y,0)/d.fps.length), 0) / data.length).toLocaleString()
        : (data.reduce((a,d) => a + (d[metric]?.[d[metric]?.length-1] || 0), 0) / data.length).toFixed(2),
      cls: 'positive'
    },
    {
      label: 'Environments',
      value: new Set(data.map(d => d.env)).size,
      cls: 'info'
    },
    {
      label: 'Algorithms',
      value: new Set(data.map(d => d.algorithm)).size,
      cls: 'warn'
    }
  ];

  grid.innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="label">${s.label}</div>
      <div class="value ${s.cls}">${s.value}</div>
    </div>
  `).join('');
}

function renderSummaryTable() {
  const tbody = document.getElementById('summaryTable');
  tbody.innerHTML = allData.map(d => {
    const finalReward = d.ep_reward[d.ep_reward.length - 1]?.toFixed(2) || 0;
    const last100 = d.ep_reward.slice(-100);
    const mean100 = (last100.reduce((a,b) => a+b, 0) / last100.length).toFixed(2);
    const std100 = Math.sqrt(last100.reduce((a,v) => a + (v - mean100)**2, 0) / last100.length).toFixed(2);
    const finalLoss = d.loss[d.loss.length - 1]?.toFixed(4) || 0;
    const finalFps = d.fps[d.fps.length - 1]?.toFixed(1) || 0;
    const avgFps = (d.fps.reduce((a,b) => a+b, 0) / d.fps.length).toFixed(1);
    const tagClass = ALGO_CLASS[d.algorithm] || '';
    
    return `<tr>
      <td><span class="tag ${tagClass}">${d.algorithm}</span></td>
      <td>${d.env}</td>
      <td>${d.seed}</td>
      <td>${finalReward}</td>
      <td>${mean100}</td>
      <td>${std100}</td>
      <td>${finalLoss}</td>
      <td>${finalFps}</td>
      <td>${avgFps}</td>
    </tr>`;
  }).join('');
}

// ===== Populate dropdowns =====
function populateDropdowns() {
  const envs = [...new Set(allData.map(d => d.env))].sort();
  const algos = [...new Set(allData.map(d => d.algorithm))].sort();
  
  const envSelect = document.getElementById('envSelect');
  envSelect.innerHTML = '<option value="all">All Environments</option>' +
    envs.map(e => `<option value="${e}">${e}</option>`).join('');
  
  const algoSelect = document.getElementById('algoSelect');
  algoSelect.innerHTML = '<option value="all">All Algorithms</option>' +
    algos.map(a => `<option value="${a}">${a}</option>`).join('');
}

// ===== Init =====
function initApp() {
  populateDropdowns();
  filteredData = getFilteredData();
  renderSummaryStats();
  renderMainChart();
  renderLossChart();
  renderComparison();
  renderSummaryTable();
}

// ===== Event Listeners =====
document.getElementById('envSelect').addEventListener('change', () => {
  renderSummaryStats(); renderMainChart(); renderLossChart();
});
document.getElementById('algoSelect').addEventListener('change', () => {
  renderSummaryStats(); renderMainChart(); renderLossChart();
});
document.getElementById('metricSelect').addEventListener('change', () => {
  renderSummaryStats(); renderMainChart();
});
document.getElementById('fileInput').addEventListener('change', e => loadFiles(e.target.files));
document.getElementById('resetBtn').addEventListener('click', () => {
  allData = [];
  loadMockData();
  document.getElementById('fileInput').value = '';
});

// Tab switching
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'comparison') {
      setTimeout(() => {
        comparisonChart.resize();
        lossComparisonChart.resize();
        fpsComparisonChart.resize();
      }, 100);
    }
    setTimeout(() => {
      mainChart.resize();
      lossChart.resize();
    }, 100);
  });
});

// Resize
window.addEventListener('resize', () => {
  mainChart.resize();
  lossChart.resize();
  comparisonChart.resize();
  lossComparisonChart.resize();
  fpsComparisonChart.resize();
});

// Load mock data
loadMockData();
</script>
